services:
  - type: web
    name: ytb2-backend
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: OPENAI_API_KEY
        sync: false # User must set this in the Render dashboard
      - key: DATABASE_URL
        value: "sqlite:///./devpath_dev.db"
      - key: JWT_SECRET_KEY
        generateValue: true
